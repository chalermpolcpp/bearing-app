<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหารหัสลูกปืน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ===== CSS VARIABLES ===== */
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.18);
    --accent2: #f7c94f;
    --text: #e8eaf2;
    --text-muted: #7a82a8;
    --success: #3ecf8e;
    --danger: #ff6b6b;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 32px rgba(0,0,0,0.4);
    --font: 'Sarabun', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== BACKGROUND TEXTURE ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,142,247,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(247,201,79,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== LAYOUT ===== */
  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.5s ease both;
  }
  .header-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-size: 26px;
    margin-bottom: 12px;
    box-shadow: 0 0 0 6px var(--accent-glow);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease both;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== INPUT GROUP ===== */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .input-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .input-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .input-label span {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }
  .input-label small {
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.7;
  }
  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  input[type="number"]::placeholder { color: var(--border); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ===== TEXT SEARCH ===== */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 12px 11px 38px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  input[type="text"]:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(247,201,79,0.12);
  }
  input[type="text"]::placeholder { color: var(--border); font-family: var(--font); font-size: 13px; font-weight: 400; letter-spacing: 0; }

  /* ===== UNIT HINT ===== */
  .unit-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 14px;
    opacity: 0.7;
  }

  /* ===== BUTTONS ===== */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s ease;
    outline: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 16px rgba(79,142,247,0.3);
  }
  .btn-primary:active { transform: scale(0.97); background: #3a7ae8; }
  .btn-clear {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    padding: 12px 14px;
  }
  .btn-clear:active { transform: scale(0.97); }

  /* ===== RESULTS ===== */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    animation: fadeUp 0.4s ease both;
  }
  .results-count {
    font-size: 13px;
    color: var(--text-muted);
  }
  .results-count strong { color: var(--accent); font-family: var(--mono); }
  .badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .badge-found { background: rgba(62,207,142,0.15); color: var(--success); }
  .badge-none { background: rgba(255,107,107,0.12); color: var(--danger); }

  /* ===== RESULT CARDS ===== */
  .result-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.35s ease both;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .result-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
  }
  .result-item:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .result-code {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1;
  }
  .result-dims {
    display: flex;
    gap: 8px;
    margin-top: 7px;
    flex-wrap: wrap;
  }
  .dim-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 12px;
    font-family: var(--mono);
  }
  .dim-chip .dim-key { color: var(--text-muted); font-size: 10px; }
  .dim-chip .dim-val { color: var(--accent2); font-weight: 600; }
  .btn-copy {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }
  .btn-copy svg { width: 16px; height: 16px; }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { border-color: var(--success); color: var(--success); background: rgba(62,207,142,0.1); }
  .btn-copy .copy-label { font-size: 10px; font-family: var(--font); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.4s ease both;
  }
  .empty-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { color: var(--text-muted); font-size: 14px; }
  .empty-state strong { color: var(--danger); font-family: var(--mono); }

  /* ===== DIVIDER ===== */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 14px;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.5;
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
    animation: fadeUp 0.45s ease both;
  }
  .stat-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">⚙️</div>
    <h1>ค้นหารหัสลูกปืน</h1>
    <p>มอเตอร์ไซค์ · Ball Bearing Finder</p>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- SEARCH CARD -->
  <div class="card" style="animation-delay:0.05s">
    <div class="card-title">🔍 ค้นหาตามขนาด (มม.)</div>

    <div class="input-row">
      <div class="input-wrap">
        <div class="input-label"><span>d</span> <small>วงแหวนใน</small></div>
        <input type="number" id="inp_d" placeholder="12" min="0" inputmode="decimal">
      </div>
      <div class="input-wrap">
        <div class="input-label"><span>D</span> <small>วงแหวนนอก</small></div>
        <input type="number" id="inp_D" placeholder="32" min="0" inputmode="decimal">
      </div>
      <div class="input-wrap">
        <div class="input-label"><span>B</span> <small>ความหนา</small></div>
        <input type="number" id="inp_B" placeholder="10" min="0" inputmode="decimal">
      </div>
    </div>

    <div class="unit-hint">* กรอกค่าที่ต้องการค้นหา (ไม่ต้องกรอกทุกช่อง)</div>

    <div class="divider">หรือค้นหาด้วยรหัส</div>

    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="inp_code" placeholder="พิมพ์รหัส เช่น 6201, 6302...">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="doSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        ค้นหา
      </button>
      <button class="btn btn-clear" onclick="doClear()" title="ล้างข้อมูล">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="results-count">พบ <strong id="countNum">0</strong> รายการ</div>
      <div class="badge" id="resultBadge"></div>
    </div>
    <div id="resultsList"></div>
  </div>

  <div class="footer">ข้อมูลลูกปืนมอเตอร์ไซค์ · v1.0</div>

</div>

function renderStats() {
  const codes = [...new Set(BEARINGS.map(b => b.code.replace(/-.*/, '')))];
  const uniqueD  = [...new Set(BEARINGS.map(b => b.d))];
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat-item"><div class="stat-val">${BEARINGS.length}</div><div class="stat-label">รหัสทั้งหมด</div></div>
    <div class="stat-item"><div class="stat-val">${uniqueD.length}</div><div class="stat-label">ขนาดวงใน</div></div>
    <div class="stat-item"><div class="stat-val">${codes.length}</div><div class="stat-label">ซีรีส์</div></div>
  `;
}

/* =====================================================
   🔍 SEARCH LOGIC
   ===================================================== */
function doSearch() {
  const d    = parseFloat(document.getElementById('inp_d').value);
  const D    = parseFloat(document.getElementById('inp_D').value);
  const B    = parseFloat(document.getElementById('inp_B').value);
  const code = document.getElementById('inp_code').value.trim().toUpperCase();

  let results = BEARINGS;

  if (!isNaN(d)) results = results.filter(b => b.d === d);
  if (!isNaN(D)) results = results.filter(b => b.D === D);
  if (!isNaN(B)) results = results.filter(b => b.B === B);
  if (code)      results = results.filter(b => b.code.toUpperCase().includes(code));

  const hasFilter = !isNaN(d) || !isNaN(D) || !isNaN(B) || code;
  if (!hasFilter) {
    showAll(BEARINGS);
    return;
  }
  renderResults(results);
}

function showAll(list) {
  renderResults(list);
}

function renderResults(list) {
  const section   = document.getElementById('resultsSection');
  const countNum  = document.getElementById('countNum');
  const badge     = document.getElementById('resultBadge');
  const resList   = document.getElementById('resultsList');

  section.style.display = 'block';
  countNum.textContent = list.length;

  if (list.length > 0) {
    badge.textContent = 'พบข้อมูล';
    badge.className = 'badge badge-found';
  } else {
    badge.textContent = 'ไม่พบ';
    badge.className = 'badge badge-none';
  }

  if (list.length === 0) {
    resList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔩</div>
        <p>ไม่พบข้อมูลลูกปืนที่ตรงกัน<br><strong>ลองปรับขนาดหรือรหัส</strong>ที่ค้นหา</p>
      </div>`;
    return;
  }

  resList.innerHTML = list.map((b, i) => `
    <div class="result-item" style="animation-delay:${i * 0.04}s">
      <div>
        <div class="result-code">${b.code}</div>
        <div class="result-dims">
          <div class="dim-chip"><span class="dim-key">d</span>&nbsp;<span class="dim-val">${b.d}</span></div>
          <div class="dim-chip"><span class="dim-key">D</span>&nbsp;<span class="dim-val">${b.D}</span></div>
          <div class="dim-chip"><span class="dim-key">B</span>&nbsp;<span class="dim-val">${b.B}</span></div>
          ${b.note ? `<div class="dim-chip"><span class="dim-key">📌</span>&nbsp;<span class="dim-val" style="color:var(--success);font-size:11px">${b.note}</span></div>` : ''}
        </div>
      </div>
      <button class="btn-copy" onclick="copyCode('${b.code}', this)" title="คัดลอกรหัส">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="copy-label">คัดลอก</span>
      </button>
    </div>
  `).join('');
}

/* =====================================================
   📋 COPY
   ===================================================== */
function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span class="copy-label">คัดลอกแล้ว</span>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="copy-label">คัดลอก</span>`;
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  });
}

/* =====================================================
   🧹 CLEAR
   ===================================================== */
function doClear() {
  document.getElementById('inp_d').value    = '';
  document.getElementById('inp_D').value    = '';
  document.getElementById('inp_B').value    = '';
  document.getElementById('inp_code').value = '';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('inp_d').focus();
}

/* =====================================================
   ⌨️ ENTER KEY SUPPORT
   ===================================================== */
['inp_d','inp_D','inp_B','inp_code'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
});
